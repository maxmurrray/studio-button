<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go To Work</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    cursor: none;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: #000;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
  }

  .cursor.hovered {
    width: 6px;
    height: 6px;
    background: #ff2d55;
  }

  .btn-wrap {
    position: relative;
    z-index: 10;
  }

  .btn {
    position: relative;
    padding: 22px 60px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #000;
    background: #fff;
    border: 2.5px solid #000;
    cursor: none;
    outline: none;
    overflow: visible;
    transition: color 0.4s ease, border-color 0.4s ease, background 0.4s ease;
    -webkit-font-smoothing: antialiased;
  }

  .btn .label {
    position: relative;
    display: inline-block;
    z-index: 2;
  }

  .btn .letter {
    display: inline-block;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s;
    position: relative;
  }

  /* chromatic ghost copies */
  .btn .letter::before,
  .btn .letter::after {
    content: attr(data-l);
    position: absolute;
    top: 0; left: 0;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn .letter::before { color: #ff2d55; mix-blend-mode: multiply; }
  .btn .letter::after  { color: #00c8ff; mix-blend-mode: multiply; }

  /* BORDER GLOW — animated SVG rectangle overlay */
  .btn-border {
    position: absolute;
    inset: -2.5px;
    pointer-events: none;
    overflow: visible;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-border rect {
    fill: none;
    stroke: url(#arc-grad);
    stroke-width: 3;
    stroke-dasharray: 20 8;
    stroke-dashoffset: 0;
  }

  /* active states */
  .btn.active {
    color: #fff;
    background: #000;
    border-color: transparent;
  }
  .btn.active .btn-border { opacity: 1; }
  .btn.active .letter::before { opacity: 0.7; transform: translate(-2.5px, 0); }
  .btn.active .letter::after  { opacity: 0.7; transform: translate(2.5px, 0); }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="c"></canvas>

<div class="btn-wrap" id="btnWrap">
  <button class="btn" id="btn">
    <span class="label" id="label"></span>
    <svg class="btn-border" id="btnBorder" viewBox="0 0 0 0" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="arc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#ff2d55"/>
          <stop offset="33%"  stop-color="#ff9f0a"/>
          <stop offset="66%"  stop-color="#30d158"/>
          <stop offset="100%" stop-color="#0a84ff"/>
        </linearGradient>
      </defs>
      <rect id="borderRect" x="1.5" y="1.5" rx="0" ry="0"/>
    </svg>
  </button>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────
const WORD   = 'GO TO WORK';
const COLORS = ['#ff2d55','#ff9f0a','#ffcc00','#30d158','#0a84ff','#bf5af2','#ff375f','#00c8ff'];
const NPARTS = 220;

// ─── SETUP ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const btn    = document.getElementById('btn');
const label  = document.getElementById('label');
const wrap   = document.getElementById('btnWrap');
const cursor = document.getElementById('cursor');
const border = document.getElementById('btnBorder');
const bRect  = document.getElementById('borderRect');

let W, H, btnCX, btnCY, btnW, btnH;
let mouse = { x: innerWidth/2, y: innerHeight/2 };
let hovered = false;
let animId;

// build letter spans
label.innerHTML = WORD.split('').map(ch =>
  ch === ' '
    ? '<span class="letter" data-l=" ">&nbsp;</span>'
    : `<span class="letter" data-l="${ch}">${ch}</span>`
).join('');
const letters = [...label.querySelectorAll('.letter')];

// resize
function resize() {
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
  const r = btn.getBoundingClientRect();
  btnCX = r.left + r.width  / 2;
  btnCY = r.top  + r.height / 2;
  btnW  = r.width;
  btnH  = r.height;
  border.setAttribute('viewBox', `0 0 ${r.width+5} ${r.height+5}`);
  bRect.setAttribute('width',  r.width+2);
  bRect.setAttribute('height', r.height+2);
}
window.addEventListener('resize', resize);
setTimeout(resize, 50);

// ─── PARTICLES ────────────────────────────────────────────────────
class Particle {
  constructor() { this.reset(true); }

  reset(initial = false) {
    const side = Math.floor(Math.random() * 4);
    if (initial) {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
    } else {
      if      (side === 0) { this.x = Math.random() * W; this.y = -10; }
      else if (side === 1) { this.x = W + 10; this.y = Math.random() * H; }
      else if (side === 2) { this.x = Math.random() * W; this.y = H + 10; }
      else                 { this.x = -10; this.y = Math.random() * H; }
    }
    this.vx     = (Math.random() - 0.5) * 1.2;
    this.vy     = (Math.random() - 0.5) * 1.2;
    this.r      = Math.random() * 2.8 + 0.8;
    this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.alpha  = Math.random() * 0.7 + 0.2;
    this.angle  = Math.random() * Math.PI * 2;
    this.speed  = Math.random() * 2 + 1;
    this.trail  = [];
    this.pulled = false;
  }

  update() {
    if (hovered) {
      const dx    = btnCX - this.x;
      const dy    = btnCY - this.y;
      const dist  = Math.sqrt(dx*dx + dy*dy);
      const force = Math.min(380 / (dist * dist + 1), 3.2);

      // rotational component — creates the vortex spiral
      const nx = dx / dist;
      const ny = dy / dist;
      const tx = -ny; // tangent
      const ty =  nx;
      const swirl = 1.8;

      this.vx += (nx * force + tx * swirl * force * 0.5);
      this.vy += (ny * force + ty * swirl * force * 0.5);

      // damping
      this.vx *= 0.92;
      this.vy *= 0.92;

      // when very close: burst outward
      if (dist < 30) {
        const bounce = 6 + Math.random() * 4;
        this.vx = -nx * bounce + (Math.random()-0.5)*4;
        this.vy = -ny * bounce + (Math.random()-0.5)*4;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      }
    } else {
      this.vx *= 0.98;
      this.vy *= 0.98;
      this.vx += (Math.random() - 0.5) * 0.1;
      this.vy += (Math.random() - 0.5) * 0.1;
    }

    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 10) this.trail.shift();

    this.x += this.vx;
    this.y += this.vy;
    this.angle += 0.04;

    // wrap around edges (only when not pulled)
    if (!hovered) {
      if (this.x < -20) this.x = W + 20;
      if (this.x > W+20) this.x = -20;
      if (this.y < -20) this.y = H + 20;
      if (this.y > H+20) this.y = -20;
    }
  }

  draw() {
    // draw trail
    if (hovered && this.trail.length > 2) {
      ctx.save();
      ctx.strokeStyle = this.color;
      ctx.lineWidth   = this.r * 0.6;
      ctx.lineCap     = 'round';
      ctx.globalAlpha = this.alpha * 0.35;
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.stroke();
      ctx.restore();
    }

    ctx.save();
    ctx.globalAlpha = this.alpha * (hovered ? 1 : 0.4);
    ctx.fillStyle   = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur  = hovered ? 12 : 0;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── LIGHTNING ARCS ──────────────────────────────────────────────
const arcs = [];
class Arc {
  constructor() {
    const perim = 2 * (btnW + btnH);
    const start = Math.random() * perim;
    this.x = btnCX - btnW/2 + (start < btnW ? start : start < btnW+btnH ? btnW : start < 2*btnW+btnH ? 2*btnW+btnH-start : 0);
    this.y = btnCY - btnH/2 + (start < btnW ? 0 : start < btnW+btnH ? start-btnW : btnH);
    this.life  = 0;
    this.maxLife = 18 + Math.random() * 14;
    this.pts   = this.generate();
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
  }
  generate() {
    const len = 40 + Math.random() * 60;
    const ang = Math.random() * Math.PI * 2;
    const pts = [{ x: this.x, y: this.y }];
    let cx = this.x, cy = this.y;
    for (let i = 0; i < 6; i++) {
      const da = (Math.random() - 0.5) * 1.4;
      cx += Math.cos(ang + da) * (len / 6);
      cy += Math.sin(ang + da) * (len / 6);
      pts.push({ x: cx, y: cy });
    }
    return pts;
  }
  draw() {
    const t = this.life / this.maxLife;
    ctx.save();
    ctx.strokeStyle = this.color;
    ctx.lineWidth   = 1.5 * (1 - t);
    ctx.globalAlpha = (1 - t) * 0.85;
    ctx.shadowColor = this.color;
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.moveTo(this.pts[0].x, this.pts[0].y);
    for (let i = 1; i < this.pts.length; i++) ctx.lineTo(this.pts[i].x, this.pts[i].y);
    ctx.stroke();
    ctx.restore();
  }
}

// ─── SHOCKWAVE ────────────────────────────────────────────────────
let shockwave = null;
function fireShockwave() {
  shockwave = { r: 0, maxR: Math.max(W, H) * 1.1, alpha: 1 };
}

// ─── INIT PARTICLES ───────────────────────────────────────────────
const parts = Array.from({ length: NPARTS }, () => new Particle());

// ─── RENDER LOOP ──────────────────────────────────────────────────
let arcTimer = 0;
let dashOffset = 0;

function render() {
  ctx.clearRect(0, 0, W, H);

  // shockwave
  if (shockwave) {
    shockwave.r     += 28;
    shockwave.alpha -= 0.025;
    if (shockwave.alpha <= 0) { shockwave = null; }
    else {
      ctx.save();
      ctx.strokeStyle = `rgba(0,0,0,${shockwave.alpha * 0.4})`;
      ctx.lineWidth   = 3 * shockwave.alpha;
      ctx.beginPath();
      ctx.arc(btnCX, btnCY, shockwave.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  // particles
  for (const p of parts) { p.update(); p.draw(); }

  // lightning
  if (hovered) {
    arcTimer++;
    if (arcTimer % 4 === 0) {
      arcs.push(new Arc());
      if (Math.random() < 0.4) arcs.push(new Arc());
    }
  }
  for (let i = arcs.length - 1; i >= 0; i--) {
    arcs[i].life++;
    arcs[i].draw();
    if (arcs[i].life >= arcs[i].maxLife) arcs.splice(i, 1);
  }

  // animated dash border
  if (hovered) {
    dashOffset -= 1.5;
    bRect.style.strokeDashoffset = dashOffset;
  }

  animId = requestAnimationFrame(render);
}
render();

// ─── MOUSE ────────────────────────────────────────────────────────
let rafMouse;
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;

  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';

  if (hovered) {
    // magnetic: pull button toward cursor, max 14px
    const dx = (e.clientX - btnCX) * 0.18;
    const dy = (e.clientY - btnCY) * 0.18;
    wrap.style.transform = `translate(${dx}px, ${dy}px)`;
  }
});

// ─── LETTER SCATTER ON HOVER ──────────────────────────────────────
// "GO TO WORK" indices: G=0 O=1 ' '=2 T=3 O=4 ' '=5 W=6 O=7 R=8 K=9
// On hover: T (3) vanishes, O (4) flips to "2" → reads "GO 2 WORK"
let flipTimer = null;

function scatterLetters() {
  letters.forEach((l, i) => {
    const dx  = (Math.random() - 0.5) * 22;
    const dy  = (Math.random() - 0.5) * 18 - 5;
    const rot = (Math.random() - 0.5) * 30;
    const delay = i * 28;
    l.style.transition = `transform ${0.5 + Math.random()*0.2}s cubic-bezier(0.34,1.56,0.64,1) ${delay}ms, color 0.3s, opacity 0.2s ${delay}ms`;
    l.style.transform  = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
    l.style.color      = COLORS[i % COLORS.length];

    // T (index 3) — blast it far and fade out completely
    if (i === 3) {
      const dir = Math.random() > 0.5 ? 1 : -1;
      l.style.transform = `translate(${dir * (55 + Math.random()*35)}px, ${-35 - Math.random()*20}px) rotate(${dir * (60 + Math.random()*40)}deg)`;
      l.style.opacity   = '0';
    }
  });

  // O (index 4) — flip to "2" slightly after scatter starts
  clearTimeout(flipTimer);
  flipTimer = setTimeout(() => {
    const l = letters[4];
    // phase 1: squish to 0 on X axis (half-flip)
    l.style.transition = 'transform 0.12s ease';
    const cur = l.style.transform;
    l.style.transform = cur + ' scaleX(0)';
    setTimeout(() => {
      // swap content at the invisible frame
      l.textContent = '2';
      l.setAttribute('data-l', '2');
      l.style.transition = 'transform 0.14s cubic-bezier(0.34,1.56,0.64,1)';
      l.style.transform  = cur + ' scaleX(1)';
    }, 120);
  }, letters[4].getBoundingClientRect ? 180 : 180);
}

function resetLetters() {
  clearTimeout(flipTimer);

  // flip "2" back to "O" first
  const lo = letters[4];
  lo.style.transition = 'transform 0.1s ease';
  const cur = lo.style.transform;
  lo.style.transform = cur + ' scaleX(0)';
  setTimeout(() => {
    lo.textContent = 'O';
    lo.setAttribute('data-l', 'O');
    lo.style.transition = 'transform 0.12s ease';
    lo.style.transform  = cur + ' scaleX(1)';
  }, 100);

  // restore all letters normally
  letters.forEach((l, i) => {
    const delay = i * 18;
    l.style.transition = `transform 0.6s cubic-bezier(0.34,1.56,0.64,1) ${delay}ms, color 0.3s ${delay}ms, opacity 0.3s ${delay}ms`;
    l.style.transform  = 'translate(0,0) rotate(0deg)';
    l.style.color      = '';
    l.style.opacity    = '1';
  });
}

// ─── HOVER ────────────────────────────────────────────────────────
btn.addEventListener('mouseenter', () => {
  hovered = true;
  cursor.classList.add('hovered');
  btn.classList.add('active');
  scatterLetters();
  resize(); // re-calc btn center after potential shifts
});

btn.addEventListener('mouseleave', () => {
  hovered = false;
  cursor.classList.remove('hovered');
  btn.classList.remove('active');
  resetLetters();
  wrap.style.transform = 'translate(0,0)';
  arcs.length = 0;
});

// ─── CLICK ────────────────────────────────────────────────────────
btn.addEventListener('click', () => {
  fireShockwave();
  // flash white
  document.body.style.transition = 'background 0.05s';
  document.body.style.background = '#000';
  setTimeout(() => {
    document.body.style.background = '#fff';
    setTimeout(() => document.body.style.transition = '', 300);
  }, 80);
});
</script>
</body>
</html>
